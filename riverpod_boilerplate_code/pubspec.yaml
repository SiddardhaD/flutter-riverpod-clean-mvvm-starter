name: riverpod_boilerplate_code
description: "Flutter Riverpod MVVM + Clean Architecture boilerplate."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.5.1

  # Code Generation (annotations)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.7.0
  # Pinned to 4.6.0: retrofit_generator 9.7.0 (the newest that still works
  # with riverpod_generator 2.x / build ^2) fails on the `Parser.DartMappable`
  # enum added in later retrofit releases. Bump both together if you move to
  # riverpod 3.x (which allows retrofit_generator 10.x / build ^4).
  retrofit: 4.6.0
  connectivity_plus: ^6.1.0

  # Navigation
  go_router: ^16.2.2

  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI / Styling
  google_fonts: ^6.2.1

  # Utilities
  equatable: ^2.0.5
  multiple_result: ^5.1.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation (builders)
  build_runner: ^2.4.9
  riverpod_generator: ^2.5.1
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.7.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
